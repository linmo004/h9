<!-- 音乐 App -->
<div id="music-app" style="display:none;position:fixed;inset:0;z-index:800;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);">

  <!-- 播放器外壳 -->
  <div class="mp-shell">

    <!-- 外壳顶部装饰条 -->
    <div class="mp-shell-top">
      <div class="mp-shell-top-bar"></div>
      <div class="mp-speaker-dots">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- 屏幕区 -->
    <div class="mp-screen-bezel">
      <div class="mp-screen">

        <!-- 主播放页 -->
        <div class="mp-page active" id="mp-page-player">
          <div class="mp-screen-topbar">
            <button class="mp-screen-btn" id="mp-to-library">
              <i data-lucide="library" style="width:14px;height:14px;"></i>
            </button>
            <div class="mp-now-playing-title" id="mp-title">未在播放</div>
            <button class="mp-screen-btn" id="mp-to-playlist">
              <i data-lucide="list-music" style="width:14px;height:14px;"></i>
            </button>
          </div>
          <div class="mp-cover-wrap">
            <div class="mp-cover-ring"></div>
            <img class="mp-cover" id="mp-cover" src="" alt="">
            <div class="mp-cover-placeholder" id="mp-cover-placeholder">
              <i data-lucide="music" style="width:28px;height:28px;"></i>
            </div>
          </div>
          <div class="mp-artist" id="mp-artist">—</div>
          <div class="mp-album" id="mp-album">—</div>
          <div class="mp-progress-wrap">
            <span class="mp-time" id="mp-cur-time">0:00</span>
            <div class="mp-progress-bar" id="mp-progress-bar">
              <div class="mp-progress-fill" id="mp-progress-fill"></div>
              <div class="mp-progress-thumb" id="mp-progress-thumb"></div>
            </div>
            <span class="mp-time" id="mp-dur-time">0:00</span>
          </div>
          <div class="mp-lyrics-scroll" id="mp-lyrics-scroll">
            <div class="mp-lyrics-inner" id="mp-lyrics-inner">
              <div class="mp-lyric-line" style="color:rgba(180,210,255,0.3);">暂无歌词</div>
            </div>
          </div>
        </div>

        <!-- 歌单/歌库页 -->
        <div class="mp-page" id="mp-page-library">
          <div class="mp-screen-topbar">
            <button class="mp-screen-btn" id="mp-library-back">
              <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
            </button>
            <div class="mp-screen-tab-row">
              <button class="mp-tab-btn active" data-mptab="songs">歌曲</button>
              <button class="mp-tab-btn" data-mptab="playlists">歌单</button>
              <button class="mp-tab-btn" data-mptab="roles">角色</button>
            </div>
          </div>

          <!-- 歌曲列表 -->
          <div class="mp-tab-page active" id="mp-tab-songs">
            <div class="mp-lib-actions">
              <button class="mp-lib-btn" id="mp-upload-btn">
                <i data-lucide="upload" style="width:10px;height:10px;"></i> 上传
              </button>
              <button class="mp-lib-btn" id="mp-url-btn">
                <i data-lucide="link" style="width:10px;height:10px;"></i> 链接
              </button>
              <button class="mp-lib-btn" id="mp-search-btn">
                <i data-lucide="search" style="width:10px;height:10px;"></i> 搜索
              </button>
            </div>
            <input type="file" id="mp-upload-file" accept="audio/*" multiple style="display:none;">
            <div class="mp-song-list" id="mp-song-list"></div>
          </div>

          <!-- 歌单列表 -->
          <div class="mp-tab-page" id="mp-tab-playlists">
            <div class="mp-lib-actions">
              <button class="mp-lib-btn" id="mp-new-playlist-btn">
                <i data-lucide="plus" style="width:10px;height:10px;"></i> 新建歌单
              </button>
            </div>
            <div class="mp-playlist-list" id="mp-playlist-list"></div>
          </div>

          <!-- 角色歌单 -->
          <div class="mp-tab-page" id="mp-tab-roles">
            <div class="mp-lib-actions">
              <button class="mp-lib-btn" id="mp-gen-role-playlist-btn">
                <i data-lucide="sparkles" style="width:10px;height:10px;"></i> AI 生成角色歌单
              </button>
            </div>
            <div class="mp-role-playlist-list" id="mp-role-playlist-list"></div>
          </div>
        </div>

        <!-- 当前播放列表页 -->
        <div class="mp-page" id="mp-page-playlist">
          <div class="mp-screen-topbar">
            <button class="mp-screen-btn" id="mp-playlist-back">
              <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
            </button>
            <div class="mp-now-playing-title">播放队列</div>
            <div style="width:28px;"></div>
          </div>
          <div class="mp-queue-list" id="mp-queue-list"></div>
        </div>

        <!-- 电台页 -->
        <div class="mp-page" id="mp-page-radio">
          <div class="mp-screen-topbar">
            <button class="mp-screen-btn" id="mp-radio-back">
              <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
            </button>
            <div class="mp-now-playing-title">电台</div>
            <div style="width:28px;"></div>
          </div>
          <div class="mp-radio-tabs">
            <button class="mp-radio-tab active" data-radiotab="my">我的电台</button>
            <button class="mp-radio-tab" data-radiotab="role">角色电台</button>
          </div>
          <div class="mp-radio-content" id="mp-radio-content">
            <!-- 我的电台 -->
            <div class="mp-radio-panel active" id="mp-radio-my">
              <div class="mp-radio-status" id="mp-radio-my-status">
                <div class="mp-radio-icon">
                  <i data-lucide="radio" style="width:22px;height:22px;color:rgba(79,140,220,0.7);"></i>
                </div>
                <div class="mp-radio-desc">开启电台，角色将收听并实时评论</div>
              </div>
              <button class="mp-radio-start-btn" id="mp-radio-start-btn">开始直播</button>
              <div class="mp-radio-comments" id="mp-radio-my-comments"></div>
            </div>
            <!-- 角色电台 -->
            <div class="mp-radio-panel" id="mp-radio-role">
              <div class="mp-role-radio-select">
                <select class="mp-select" id="mp-role-radio-select"></select>
                <button class="mp-lib-btn" id="mp-role-radio-start-btn">收听</button>
              </div>
              <div class="mp-radio-now" id="mp-role-radio-now">
                <div class="mp-radio-desc">选择一个角色的电台收听</div>
              </div>
              <div class="mp-radio-comments" id="mp-radio-role-comments"></div>
            </div>
          </div>
        </div>

        <!-- 聊天室页 -->
        <div class="mp-page" id="mp-page-chatroom">
          <div class="mp-screen-topbar">
            <button class="mp-screen-btn" id="mp-chatroom-back">
              <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
            </button>
            <div class="mp-now-playing-title" id="mp-chatroom-title">音乐聊天室</div>
            <button class="mp-screen-btn" id="mp-chatroom-settings-btn">
              <i data-lucide="settings" style="width:14px;height:14px;"></i>
            </button>
          </div>
          <div class="mp-chatroom-now" id="mp-chatroom-now">
            <div class="mp-chatroom-cover-wrap">
              <img class="mp-chatroom-cover" id="mp-chatroom-cover" src="" alt="">
              <div class="mp-chatroom-cover-ph">
                <i data-lucide="music" style="width:12px;height:12px;"></i>
              </div>
            </div>
            <div class="mp-chatroom-info">
              <div class="mp-chatroom-song" id="mp-chatroom-song">未在播放</div>
              <div class="mp-chatroom-artist" id="mp-chatroom-artist">—</div>
            </div>
            <button class="mp-chatroom-change-btn" id="mp-chatroom-change-btn">
              <i data-lucide="skip-forward" style="width:10px;height:10px;"></i> 切歌
            </button>
          </div>
          <div class="mp-chatroom-msgs" id="mp-chatroom-msgs"></div>
          <div class="mp-chatroom-input-row">
            <input class="mp-chatroom-input" id="mp-chatroom-input" placeholder="说点什么…" autocomplete="off">
            <button class="mp-chatroom-send-btn" id="mp-chatroom-send-btn">
              <i data-lucide="send" style="width:12px;height:12px;"></i>
            </button>
          </div>
        </div>

      </div><!-- /mp-screen -->
    </div><!-- /mp-screen-bezel -->

    <!-- 外壳品牌标志 -->
    <div class="mp-brand">HALO · 九</div>
    
    <!-- 设置按钮行 -->
<div class="mp-shell-controls">
  <button class="mp-shell-settings-btn" id="mp-shell-settings-btn" title="设置">
    <i data-lucide="settings-2" style="width:13px;height:13px;"></i>
  </button>
</div>

<!-- 设置面板 -->
<div class="mp-settings-panel" id="mp-settings-panel" style="display:none;">

  <!-- 全屏/轮廓切换 -->
  <div class="mp-settings-section-title">显示模式</div>
  <div class="mp-settings-row">
    <button class="mp-view-btn active" id="mp-view-outline" data-view="outline">
      <i data-lucide="tablet-smartphone" style="width:12px;height:12px;"></i>
      有轮廓
    </button>
    <button class="mp-view-btn" id="mp-view-fullscreen" data-view="fullscreen">
      <i data-lucide="maximize-2" style="width:12px;height:12px;"></i>
      全屏
    </button>
  </div>

  <!-- 主题色选择 -->
  <div class="mp-settings-section-title">主题色</div>
  <div class="mp-theme-swatches" id="mp-theme-swatches">
    <button class="mp-theme-swatch active" data-theme="blue" style="background:linear-gradient(135deg,#4a80b8,#a0c8e8);" title="蓝银"></button>
    <button class="mp-theme-swatch" data-theme="rosegold" style="background:linear-gradient(135deg,#c8886a,#e8c0b0);" title="玫瑰金银"></button>
    <button class="mp-theme-swatch" data-theme="dark" style="background:linear-gradient(135deg,#2a3040,#8090a8);" title="极夜银"></button>
    <button class="mp-theme-swatch" data-theme="green" style="background:linear-gradient(135deg,#2a6858,#60b098);" title="翡翠银"></button>
    <button class="mp-theme-swatch" data-theme="purple" style="background:linear-gradient(135deg,#5840a0,#a890d8);" title="暮紫银"></button>
    <button class="mp-theme-swatch" data-theme="gold" style="background:linear-gradient(135deg,#8a6020,#d8b060);" title="琥珀金银"></button>
  </div>

</div>

    <!-- 圆形按键区 -->
    <div class="mp-keypad">

      <!-- 顶部功能键行 -->
      <div class="mp-keyrow mp-keyrow-top">
        <button class="mp-key mp-key-sm" id="mp-key-radio" title="电台">
          <i data-lucide="radio" style="width:14px;height:14px;"></i>
        </button>
        <button class="mp-key mp-key-sm" id="mp-key-chatroom" title="聊天室">
          <i data-lucide="message-circle" style="width:14px;height:14px;"></i>
        </button>
        <button class="mp-key mp-key-sm" id="mp-key-share" title="分享到了了">
          <i data-lucide="share-2" style="width:14px;height:14px;"></i>
        </button>
        <button class="mp-key mp-key-sm" id="mp-key-close" title="关闭">
          <i data-lucide="x" style="width:14px;height:14px;"></i>
        </button>
      </div>

      <!-- 中央圆形方向盘 -->
      <div class="mp-dpad-wrap">
        <div class="mp-dpad">
          <button class="mp-dpad-btn mp-dpad-up" id="mp-key-prev" title="上一首">
            <i data-lucide="skip-back" style="width:14px;height:14px;"></i>
          </button>
          <button class="mp-dpad-btn mp-dpad-down" id="mp-key-next" title="下一首">
            <i data-lucide="skip-forward" style="width:14px;height:14px;"></i>
          </button>
          <button class="mp-dpad-btn mp-dpad-left" id="mp-key-vol-down" title="音量-">
            <i data-lucide="volume-1" style="width:14px;height:14px;"></i>
          </button>
          <button class="mp-dpad-btn mp-dpad-right" id="mp-key-vol-up" title="音量+">
            <i data-lucide="volume-2" style="width:14px;height:14px;"></i>
          </button>
          <button class="mp-dpad-center" id="mp-key-play" title="播放/暂停">
            <i data-lucide="play" id="mp-play-icon" style="width:18px;height:18px;"></i>
          </button>
          <div class="mp-dpad-ring mp-dpad-ring-outer"></div>
          <div class="mp-dpad-ring mp-dpad-ring-inner"></div>
        </div>
      </div>

      <!-- 底部功能键行 -->
      <div class="mp-keyrow mp-keyrow-bottom">
        <button class="mp-key mp-key-sm" id="mp-key-mode" title="循环模式">
          <i data-lucide="repeat" style="width:14px;height:14px;"></i>
        </button>
        <button class="mp-key mp-key-sm" id="mp-key-shuffle" title="随机">
          <i data-lucide="shuffle" style="width:14px;height:14px;"></i>
        </button>
        <button class="mp-key mp-key-sm" id="mp-key-like" title="喜欢">
          <i data-lucide="heart" style="width:14px;height:14px;"></i>
        </button>
        <button class="mp-key mp-key-sm" id="mp-key-info" title="歌曲信息">
          <i data-lucide="info" style="width:14px;height:14px;"></i>
        </button>
      </div>

    </div><!-- /mp-keypad -->

    <!-- 外壳底部装饰 -->
    <div class="mp-shell-bottom">
      <div class="mp-port-row">
        <div class="mp-port"></div>
        <div class="mp-port mp-port-main"></div>
        <div class="mp-port"></div>
      </div>
    </div>

  </div><!-- /mp-shell -->

  <!-- 悬浮迷你播放条 -->
  <div class="mp-mini-bar" id="mp-mini-bar" style="display:none;">
    <img class="mp-mini-cover" id="mp-mini-cover" src="" alt="">
    <div class="mp-mini-info">
      <div class="mp-mini-title" id="mp-mini-title">未在播放</div>
      <div class="mp-mini-artist" id="mp-mini-artist">—</div>
    </div>
    <button class="mp-mini-play-btn" id="mp-mini-play-btn">
      <i data-lucide="play" style="width:14px;height:14px;"></i>
    </button>
    <button class="mp-mini-open-btn" id="mp-mini-open-btn">
      <i data-lucide="chevron-up" style="width:14px;height:14px;"></i>
    </button>
  </div>

</div>

<!-- 歌曲信息编辑弹窗 -->
<div class="mp-modal-mask" id="mp-song-edit-modal" style="display:none;">
  <div class="mp-modal-box">
    <div class="mp-modal-title">歌曲信息</div>
    <label class="mp-modal-label">歌曲名</label>
    <input class="mp-modal-input" id="mp-edit-title" placeholder="歌曲名称…">
    <label class="mp-modal-label">歌手</label>
    <input class="mp-modal-input" id="mp-edit-artist" placeholder="歌手名…">
    <label class="mp-modal-label">专辑</label>
    <input class="mp-modal-input" id="mp-edit-album" placeholder="专辑名…">
    <label class="mp-modal-label">封面图片</label>
    <div style="display:flex;gap:6px;align-items:center;">
      <input class="mp-modal-input" id="mp-edit-cover-url" placeholder="封面 URL…" style="flex:1;margin-bottom:0;">
      <button class="mp-modal-btn-ghost" id="mp-edit-cover-local-btn" style="white-space:nowrap;padding:8px 10px;">
        <i data-lucide="image" style="width:12px;height:12px;"></i>
      </button>
      <input type="file" id="mp-edit-cover-file" accept="image/*" style="display:none;">
    </div>
    <img id="mp-edit-cover-preview" style="display:none;width:64px;height:64px;object-fit:cover;border-radius:8px;margin-top:6px;" alt="">
    <label class="mp-modal-label" style="margin-top:10px;">歌词（支持 .lrc 时间轴格式或纯文字）</label>
    <div style="display:flex;gap:6px;margin-bottom:4px;">
      <button class="mp-modal-btn-ghost" id="mp-edit-lrc-btn" style="flex:1;">
        <i data-lucide="file-text" style="width:10px;height:10px;"></i> 上传 .lrc
      </button>
      <input type="file" id="mp-edit-lrc-file" accept=".lrc,.txt" style="display:none;">
      <button class="mp-modal-btn-ghost" id="mp-lastfm-search-btn" style="flex:1;">
        <i data-lucide="sparkles" style="width:10px;height:10px;"></i> Last.fm 补全
      </button>
    </div>
    <textarea class="mp-modal-textarea" id="mp-edit-lyrics" placeholder="粘贴歌词或上传 .lrc 文件…" style="min-height:80px;"></textarea>
    <div class="mp-modal-btns">
      <button class="mp-modal-btn-primary" id="mp-song-edit-confirm">保存</button>
      <button class="mp-modal-btn-ghost" id="mp-song-edit-cancel">取消</button>
    </div>
  </div>
</div>

<!-- 添加链接弹窗 -->
<div class="mp-modal-mask" id="mp-url-modal" style="display:none;">
  <div class="mp-modal-box">
    <div class="mp-modal-title">添加音频链接</div>
    <label class="mp-modal-label">音频 URL（mp3/ogg/wav 等直链）</label>

    <input class="mp-modal-input" id="mp-url-title" placeholder="歌曲名称…">
    <label class="mp-modal-label">歌手</label>
    <input class="mp-modal-input" id="mp-url-artist" placeholder="歌手名…">
    <div class="mp-modal-btns">
      <button class="mp-modal-btn-primary" id="mp-url-confirm">添加</button>
      <button class="mp-modal-btn-ghost" id="mp-url-cancel">取消</button>
    </div>
  </div>
</div>

  <div class="mp-modal-box">
    <div class="mp-modal-title">分享音乐</div>
    <div class="mp-share-card" id="mp-share-preview">
      <img class="mp-share-cover" id="mp-share-cover" src="" alt="">
      <div class="mp-share-info">

      </button>
      <button class="mp-modal-btn-ghost" id="mp-share-to-suiyan">
