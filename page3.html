<!-- page3.html -->
<div id="page3-inner">

  <!-- 相性卡片区：占页面上半部分 -->
  <div id="affinity-stack-wrap">
    <div id="affinity-card-stack">

      <!-- 总排行榜卡片 -->
      <div class="affinity-card" id="affinity-card-total" data-card-order="0">
        <div class="affinity-card-header">
          <span class="affinity-card-title">今日相性总榜</span>
          <span class="affinity-card-date" id="affinity-total-date"></span>
        </div>
        <div class="affinity-total-list" id="affinity-total-list"></div>
      </div>

      <!-- 用户卡片 -->
      <div class="affinity-card" id="affinity-card-user" data-card-order="1">
        <div class="affinity-person-top">
          <div class="affinity-person-fortune-header">
            <img class="affinity-person-avatar" id="affinity-user-avatar" src="" alt="">
            <span class="affinity-person-name" id="affinity-user-name">用户</span>
            <span class="affinity-fortune-badge">今日运势</span>
          </div>
          <div class="affinity-fortune-content" id="affinity-user-fortune"></div>
        </div>
        <div class="affinity-person-bottom">
          <div class="affinity-rank-list" id="affinity-user-rank-list"></div>
          <div class="affinity-disclaimer">仅供娱乐参考 不要影响心情呀 &gt;_&lt;</div>
        </div>
      </div>

      <!-- 角色卡片动态生成 -->
      <div id="affinity-role-cards-wrap"></div>

    </div>

    <!-- 左下角隐藏点击区（透明，点击切换下一张） -->
    <div id="affinity-card-tap-zone"></div>

    <!-- 右上角卡片指示器 -->
    <div id="affinity-card-indicator">1 / 1</div>
  </div>

  <!-- App 网格：4列 × 3行 = 12个 -->
  <div id="page3-apps-grid">
    <div class="app-item">
      <img class="app-icon" src="https://img.icons8.com/fluency/96/partly-cloudy-day.png" alt="">
      <div class="app-name">天气</div>
    </div>
    <div class="app-item">
      <img class="app-icon" src="https://img.icons8.com/fluency/96/calculator.png" alt="">
      <div class="app-name">计算器</div>
    </div>
    <div class="app-item">
      <img class="app-icon" src="https://img.icons8.com/fluency/96/gallery.png" alt="">
      <div class="app-name">相册</div>
    </div>
    <div class="app-item">
      <img class="app-icon" src="https://img.icons8.com/fluency/96/calendar--v1.png" alt="">
      <div class="app-name">日历</div>
    </div>
    <div class="app-item">
      <img class="app-icon" src="https://img.icons8.com/fluency/96/alarm.png" alt="">
      <div class="app-name">闹钟</div>
    </div>
