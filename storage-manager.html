<!-- 存储管理全屏页面 -->
<div id="storage-manager-view" style="display:none; position:fixed; inset:0; z-index:600; background:var(--bg,#F5F5F0); flex-direction:column;">

  <!-- 顶栏 -->
  <div class="cs-topbar">
    <button class="cs-close-btn" id="storage-back-btn">←</button>
    <div class="cs-topbar-title">存储管理</div>
    <button id="storage-refresh-btn" style="position:absolute;right:14px;background:none;border:none;font-size:13px;color:var(--primary,#99C8ED);cursor:pointer;">刷新</button>
  </div>

  <!-- 内容区 -->
  <div style="flex:1;overflow-y:auto;padding:16px 14px 40px;">

    <!-- 总览 -->
    <div style="text-align:center;margin-bottom:6px;">
      <div id="storage-total-text" style="font-size:13px;color:var(--text-mid);margin-bottom:4px;"></div>
      <div id="storage-warning" style="font-size:11px;color:#e07a7a;min-height:16px;"></div>
    </div>

    <!-- 甜甜圈图 -->
    <div style="display:flex;justify-content:center;margin-bottom:20px;">
      <div style="position:relative;width:200px;height:200px;">
        <canvas id="storage-donut-canvas" width="200" height="200"></canvas>
        <div id="storage-donut-center" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;">
          <div style="font-size:20px;font-weight:700;color:var(--text-dark);" id="storage-center-value"></div>
          <div style="font-size:10px;color:var(--text-light);">已使用</div>
        </div>
      </div>
    </div>

    <!-- 图例 + 详细列表 -->
    <div style="background:#fff;border-radius:16px;border:1.5px solid rgba(153,200,237,0.16);padding:6px 0;margin-bottom:16px;" id="storage-list"></div>

    <!-- 分割线 -->
    <div style="font-size:11px;font-weight:600;color:var(--text-light);letter-spacing:.07em;text-transform:uppercase;padding-left:4px;margin-bottom:8px;">图片压缩</div>

    <!-- 图片压缩区域 -->
    <div style="background:#fff;border-radius:16px;border:1.5px solid rgba(153,200,237,0.16);padding:16px;margin-bottom:16px;">
      <div id="storage-image-stats" style="font-size:13px;color:var(--text-dark);margin-bottom:12px;"></div>
      <div style="margin-bottom:12px;">
        <div style="font-size:12px;color:var(--text-mid);margin-bottom:8px;">压缩质量</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="storage-quality-btn active" data-quality="high">高质量 (80%)</button>
          <button class="storage-quality-btn" data-quality="medium">均衡 (65%)</button>
          <button class="storage-quality-btn" data-quality="low">最小体积 (45%)</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="storage-compress-btn" style="flex:1;background:var(--primary,#99C8ED);color:#fff;border:none;border-radius:999px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">一键压缩所有图片</button>
      </div>
      <div id="storage-compress-result" style="font-size:12px;color:#4caf84;margin-top:8px;min-height:16px;text-align:center;"></div>
    </div>

    <!-- Token 预估器 -->
    <div style="font-size:11px;font-weight:600;color:var(--text-light);letter-spacing:.07em;text-transform:uppercase;padding-left:4px;margin-bottom:8px;">Token 预估器</div>

    <div style="background:#fff;border-radius:16px;border:1.5px solid rgba(153,200,237,0.16);padding:16px;margin-bottom:16px;">
      <div style="font-size:12px;color:var(--text-mid);margin-bottom:10px;">选择角色，查看每次调用 AI 时发送的字符数分析</div>
      <div id="storage-token-role-list" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

  </div>
</div>

<!-- Token 分析弹窗 -->
<div id="storage-token-modal" style="display:none;position:fixed;inset:0;z-index:700;background:rgba(26,31,46,0.38);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;">
  <div style="background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:22px 18px 40px;max-height:85dvh;overflow-y:auto;">
    <div style="font-size:15px;font-weight:700;color:var(--text-dark);margin-bottom:16px;" id="storage-token-modal-title">Token 分析</div>
    <div id="storage-token-modal-body"></div>
    <button id="storage-token-modal-close" style="width:100%;margin-top:16px;background:var(--bg2,#F8F9FA);color:var(--text-mid);border:1.5px solid var(--light-blue,#B3D8F4);border-radius:999px;padding:11px;font-size:14px;cursor:pointer;font-family:inherit;">关闭</button>
  </div>
</div>
